<div class="oj-hybrid-padding">
  <div class="oj-flex oj-sm-flex-items-initial oj-sm-justify-content-space-between oj-sm-align-items-center">
    <h2 class="oj-typography-heading-md">Punto de Venta</h2>
    <div class="oj-flex oj-sm-align-items-center">
      <span class="oj-ux-ico-contact oj-sm-margin-2x-end"></span>
      <span class="oj-typography-body-md"><oj-bind-text value="[[userLogin]]"></oj-bind-text></span>
    </div>
  </div>

  <div class="oj-flex oj-sm-margin-4x-top">
    <div class="oj-flex-item oj-sm-12 oj-md-8">
      <oj-form-layout label-edge="inside">
        <oj-input-text id="search" label-hint="Buscar por nombre o código de barras..." 
                       value="{{searchTerm}}" on-raw-value-changed="[[handleSearch]]"
                       clear-icon="always">
          <span slot="start" class="oj-ux-ico-search"></span>
        </oj-input-text>
      </oj-form-layout>

      <oj-table id="cartTable" class="oj-sm-margin-4x-top"
                aria-label="Carrito de compras"
                data="[[cartDataProvider]]"
                columns='[
                  {"headerText": "Producto", "field": "nombre"},
                  {"headerText": "Precio", "field": "precio", "template": "priceTemplate"},
                  {"headerText": "Cant.", "field": "cantidad", "template": "qtyTemplate"},
                  {"headerText": "Subtotal", "field": "subtotal", "template": "priceTemplate"},
                  {"headerText": "Acción", "template": "actionTemplate"}
                ]'
                style="width: 100%; height: 400px;">
        
        <template slot="priceTemplate" data-oj-as="cell">
          $ <oj-bind-text value="[[cell.data.toFixed(2)]]"></oj-bind-text>
        </template>

        <template slot="qtyTemplate" data-oj-as="cell">
          <oj-input-number value="{{cell.row.cantidad}}" min="1" 
                           on-value-changed="[[updateCartTotals]]"></oj-input-number>
        </template>

        <template slot="actionTemplate" data-oj-as="cell">
          <oj-button display="icons" chroming="borderless" on-oj-action="[[() => removeProduct(cell.row.id)]]">
            <span slot="startIcon" class="oj-ux-ico-trash"></span>
            Eliminar
          </oj-button>
        </template>
      </oj-table>
    </div>

    <div class="oj-flex-item oj-sm-12 oj-md-4 oj-sm-padding-4x-start">
      <div class="oj-panel oj-bg-neutral-20 oj-sm-padding-6x">
        <h3 class="oj-typography-heading-sm">Resumen de Venta</h3>
        <hr>
        <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-4x-vertical">
          <span class="oj-typography-body-lg oj-typography-semi-bold">TOTAL:</span>
          <span class="oj-typography-heading-sm" style="color: var(--app-primary-color)">
            $ <oj-bind-text value="[[totalVenta().toFixed(2)]]"></oj-bind-text>
          </span>
        </div>
        <oj-button id="finishSale" chroming="solid" class="oj-button-lg" 
                   style="width: 100%;" on-oj-action="[[finalizeSale]]"
                   disabled="[[cart().length === 0 || loading()]]">
          Finalizar Venta
        </oj-button>
      </div>
    </div>
  </div>
</div>
